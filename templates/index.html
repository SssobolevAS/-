<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEP 8 Analyzer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        header p {
            opacity: 0.9;
        }

        main {
            padding: 30px;
        }

        .editor {
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 300px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            resize: vertical;
            background: #f8f9fa;
        }

        textarea:focus {
            border-color: #667eea;
            outline: none;
            background: white;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            flex: 2;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }

        .btn-secondary {
            background: #6c757d;
            flex: 1;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .results {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            min-height: 200px;
            max-height: 500px;
            overflow-y: auto;
        }

        .error-item {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.2s;
        }

        .error-item:hover {
            border-color: #dc3545;
            box-shadow: 0 5px 15px rgba(220,53,69,0.1);
            transform: translateX(5px);
        }

        .error-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .line-badge {
            background: #6c757d;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .error-code {
            background: #dc3545;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }

        .error-name {
            font-weight: 600;
            color: #333;
        }

        .error-message {
            color: #666;
            margin-bottom: 10px;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 4px;
        }

        .error-line {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            padding: 10px;
            font-family: monospace;
            position: relative;
        }

        .error-pointer {
            color: #dc3545;
            font-weight: bold;
            font-size: 18px;
            margin-top: 2px;
        }

        .success-message {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
        }

        .success-message i {
            font-size: 48px;
            color: #28a745;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #6c757d;
            border-top: 1px solid #e9ecef;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-code"></i> PEP 8 Analyzer</h1>
            <p>Проверка Python кода на соответствие стандартам</p>
        </header>

        <main>
            <div class="editor">
                <textarea id="code" placeholder="# Введите ваш Python код..."># Пример кода с ошибками
def bad_function(x,y):
    result= x+y
    if result>10:
    print("Больше 10")
    else:print("Меньше или равно 10")
    return result

class bad_class:
    def __init__(self):
    self.value=10

import sys, os
print(bad_function(5,7))</textarea>
            </div>

            <div class="buttons">
                <button id="analyzeBtn" class="btn-primary">
                    <i class="fas fa-search"></i> Анализировать
                </button>
                <button id="clearBtn" class="btn-secondary">
                    <i class="fas fa-broom"></i> Очистить
                </button>
            </div>

            <div id="results" class="results">
                <div style="text-align: center; color: #6c757d; padding: 40px;">
                    <i class="fas fa-info-circle" style="font-size: 48px; margin-bottom: 20px;"></i>
                    <p>Нажмите "Анализировать" для проверки кода</p>
                </div>
            </div>
        </main>

        <footer>
            <p>Нажмите Ctrl+Enter для быстрого анализа</p>
        </footer>
    </div>

    <script>
        const codeInput = document.getElementById('code');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const clearBtn = document.getElementById('clearBtn');
        const resultsDiv = document.getElementById('results');

        // Функция анализа
        async function analyzeCode() {
            const code = codeInput.value;

            if (!code.trim()) {
                showError('Введите код для анализа');
                return;
            }

            // Показываем загрузку
            resultsDiv.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Анализ кода...</p>
                </div>
            `;

            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Анализ...';

            try {
                const response = await fetch('http://localhost:8000/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ code })
                });

                const data = await response.json();

                if (data.success) {
                    displayResults(data);
                } else {
                    showError(data.error || 'Ошибка анализа');
                }
            } catch (error) {
                showError('Ошибка подключения к серверу');
                console.error(error);
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.innerHTML = '<i class="fas fa-search"></i> Анализировать';
            }
        }

        // Отображение результатов
        function displayResults(data) {
            const errors = data.errors || [];
            const lines = codeInput.value.split('\n');

            if (errors.length === 0) {
                resultsDiv.innerHTML = `
                    <div class="success-message">
                        <i class="fas fa-check-circle"></i>
                        <h3 style="margin-bottom: 10px;">✅ Код соответствует PEP 8!</h3>
                        <p style="font-size: 18px;">Оценка качества: ${data.summary.score}/100</p>
                    </div>
                `;
                return;
            }

            let stats = `
                <div class="stats">
                    <span><strong>Найдено ошибок:</strong> ${errors.length}</span>
                    <span><strong>Строк кода:</strong> ${data.summary.lines}</span>
                    <span><strong>Оценка:</strong> ${data.summary.score}/100</span>
                </div>
            `;

            let html = stats;

            errors.forEach((error, index) => {
                const lineContent = lines[error.line - 1] || '';
                
                html += `
                    <div class="error-item" onclick="showDetails(${index})">
                        <div class="error-header">
                            <span class="line-badge">Строка ${error.line}:${error.column}</span>
                            <span class="error-code">${error.code}</span>
                            <span class="error-name">${escapeHtml(error.name)}</span>
                        </div>
                        <div class="error-message">
                            <i class="fas fa-exclamation-triangle" style="color: #dc3545; margin-right: 8px;"></i>
                            ${escapeHtml(error.message)}
                        </div>
                `;
                
                if (lineContent) {
                    const column = Math.min(error.column, lineContent.length);
                    html += `
                        <div class="error-line">
                            <pre style="margin: 0;">${escapeHtml(lineContent)}</pre>
                            ${column > 0 ? `<div class="error-pointer" style="margin-left: ${column * 8}px;">↑</div>` : ''}
                        </div>
                    `;
                }
                
                html += `</div>`;
            });

            resultsDiv.innerHTML = html;
            window.currentErrors = errors;
        }

        // Показать детали ошибки
        window.showDetails = function(index) {
            const error = window.currentErrors[index];
            if (!error) return;
            
            alert(`
📌 Ошибка: ${error.code}
📝 Название: ${error.name}
💬 Описание: ${error.message}
📍 Позиция: строка ${error.line}, колонка ${error.column}
⚡ Серьезность: ${error.severity}
            `);
        };

        // Показать ошибку
        function showError(message) {
            resultsDiv.innerHTML = `
                <div style="background: #f8d7da; color: #721c24; padding: 30px; border-radius: 8px; text-align: center;">
                    <i class="fas fa-exclamation-circle" style="font-size: 48px; margin-bottom: 20px;"></i>
                    <h3 style="margin-bottom: 10px;">❌ Ошибка</h3>
                    <p>${escapeHtml(message)}</p>
                </div>
            `;
        }

        // Экранирование HTML
        function escapeHtml(text) {
            if (!text) return '';
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // Очистка
        function clearAll() {
            if (confirm('Очистить код и результаты?')) {
                codeInput.value = '# Введите ваш Python код...';
                resultsDiv.innerHTML = `
                    <div style="text-align: center; color: #6c757d; padding: 40px;">
                        <i class="fas fa-info-circle" style="font-size: 48px; margin-bottom: 20px;"></i>
                        <p>Код очищен</p>
                    </div>
                `;
            }
        }

        // Проверка сервера
        async function checkServer() {
            try {
                const response = await fetch('http://localhost:8000/health');
                if (response.ok) {
                    console.log('✅ Сервер работает');
                }
            } catch (error) {
                console.error('❌ Сервер недоступен');
            }
        }

        // Обработчики событий
        analyzeBtn.addEventListener('click', analyzeCode);
        clearBtn.addEventListener('click', clearAll);

        // Ctrl+Enter
        codeInput.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                analyzeCode();
            }
        });

        // Проверяем сервер при загрузке
        checkServer();
    </script>
</body>
</html>
